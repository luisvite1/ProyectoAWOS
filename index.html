<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar "Los Litros" - Login</title>
    <link rel="stylesheet" href="./frontend/css/global.css">
    <link rel="stylesheet" href="./frontend/css/login.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e63946">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Los Litros">
</head>
<body>

    <div class="auth-card">
        <h1>Bar "Los Litros"</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Usuario" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Entrar al Sistema</button>
        </form>

        <div class="auth-footer">
            ¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a>
        </div>
    </div>

    <script src="./frontend/js/auth.js">   if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/ProyectoAWOS/sw.js')
            .then(reg => console.log('SW registrado'))
            .catch(err => console.log('SW error:', err));
    });
}</script>

    
</body>
</html>
